---
name: Compile PureData Object
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  LIBNAME: OpenScofo
  LIBVERSION: 0.1.4
permissions:
  contents: write
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        precision: [32]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # -----------------------
      # Linux dependencies
      # -----------------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo add-apt-repository ppa:pure-data/pure-data -y
          sudo apt install puredata -y
          sudo apt install libboost-all-dev libgtest-dev python3-pybind11 -y
          npm install -g tree-sitter-cli
          pip install build scikit-build-core cibuildwheel twine
      # -----------------------
      # macOS dependencies
      # -----------------------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pd pybind11 googletest tree-sitter boost
          npm install -g tree-sitter-cli
          pip install build scikit-build-core cibuildwheel twine
      # -----------------------
      # Windows dependencies
      # -----------------------
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npm install -g tree-sitter-cli
          winget install -e --id LLVM.LLVM --accept-source-agreements --accept-package-agreements
          winget install -e --id MillerPuckette.PureData --accept-source-agreements
          python -m pip install --upgrade pip
          python -m pip install build scikit-build-core cibuildwheel twine pybind11
      # -----------------------
      # Configure (Unix)
      # -----------------------
      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m build --wheel \
            -Cbuild-dir=build \
            -Ccmake.define.PD_FLOATSIZE=${{ matrix.precision }} \
            -Ccmake.define.CMAKE_BUILD_TYPE=Release \
            -Ccmake.define.CMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -Ccmake.define.OSCOFO_BUILD_TESTS=OFF \
            -Ccmake.define.PD_LIB_DIR="${{ github.workspace }}/${{ env.LIBNAME }}" \
            -Ccmake.define.BUILD_ALL=ON \
            -Ccmake.args="-G Ninja"
      # -----------------------
      # Configure (Windows)
      # -----------------------
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pybind11Dir = python -m pybind11 --cmakedir
          $treeSitterBin = (Get-Command tree-sitter.cmd).Source
          $buildArgs = @(
            "-Cbuild-dir=build"
            "-Ccmake.define.PD_FLOATSIZE=${{ matrix.precision }}"
            "-Ccmake.define.CMAKE_BUILD_TYPE=Release"
            "-Ccmake.define.pybind11_DIR=$pybind11Dir"
            "-Ccmake.define.TREE_SITTER_EXECUTABLE=$treeSitterBin"
            "-Ccmake.define.CMAKE_C_COMPILER=clang"
            "-Ccmake.define.CMAKE_CXX_COMPILER=clang++"
            "-Ccmake.define.OSCOFO_BUILD_TESTS=OFF"
            "-Ccmake.define.PD_LIB_DIR=${{ github.workspace }}/${{ env.LIBNAME }}"
            "-Ccmake.define.BUILD_ALL=ON"
            "-Ccmake.args=-G Ninja"
          )
          python -m build --wheel @buildArgs
      # -----------------------
      # Upload artifacts
      # -----------------------
      - name: Upload PureData Object
        uses: actions/upload-artifact@v4
        with:
          name: PureData-${{env.LIBNAME}}-${{env.LIBVERSION}}-pd${{matrix.precision}}-${{
            runner.os }}
          path: ${{env.LIBNAME}}
      - name: Upload Max Object
        uses: actions/upload-artifact@v4
        if: runner.os != 'Linux'
        with:
          name: Max-${{env.LIBNAME}}-${{env.LIBVERSION}}-${{ runner.os }}
          path: max
      - name: Upload Python Object
        uses: actions/upload-artifact@v4
        with:
          name: Python-${{env.LIBNAME}}-${{env.LIBVERSION}}-${{ runner.os }}
          path: dist/*.whl

