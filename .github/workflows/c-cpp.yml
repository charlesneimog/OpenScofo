---
name: Compile PureData Object
on:
  push:
    branches: [main]
#╭──────────────────────────────────────╮
#│  Uncomment if you want to trigger a  │
#│               release                │
#╰──────────────────────────────────────╯
  # workflow_dispatch:
  #   inputs:
  #     publish_release:
  #       description: Publish a GitHub Release using LIBVERSION after build
  #       required: false
  #       type: boolean
  #       default: false
env:
  LIBNAME: OpenScofo
  LIBVERSION: 0.1.4
permissions:
  contents: write
jobs:
  python:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: Mac Build
        if: runner.os == 'macOS'
        run: |
          pip install build scikit-build-core cibuildwheel twine
          CMAKE_BUILD_PARALLEL_LEVEL=8 cibuildwheel --output-dir dist
      - name: Linux Build
        if: runner.os == 'Linux'
        run: |
          pip install build scikit-build-core cibuildwheel twine
          CMAKE_BUILD_PARALLEL_LEVEL=8 cibuildwheel --output-dir dist
      - name: Windows Build
        if: runner.os == 'Windows'
        run: |
          python -m pip install build scikit-build-core cibuildwheel twine
          $env:CMAKE_BUILD_PARALLEL_LEVEL = "8"
          cibuildwheel --output-dir dist
      - name: Upload to PyPI
        run: |
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_API_TOKEN }}
  macos:
    runs-on: ${{ matrix.machines }}
    strategy:
      matrix:
        precision: [32] #, 64]
        machines: [macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install PureData and Deps
        run: |
          brew install pd
          brew install pybind11
          brew install googletest
          brew install tree-sitter
          brew install boost
          npm install -g tree-sitter-cli
      - name: Build
        run: |
          cmake . -B build -DPD_LIB_DIR=./ -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DPD_FLOATSIZE=${{ matrix.precision }} -DOSCOFO_BUILD_TESTS=OFF
          cmake --build build --parallel $(sysctl -n hw.physicalcpu)
          sudo cmake --install build
      - name: Upload Object
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.LIBNAME}}-${{env.LIBVERSION}}-${{matrix.machines}}-universal-pd${{matrix.precision}}
          path: ${{env.LIBNAME}}
  linux-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64] #, arm, aarch64]
        precision: [32] #, 64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - name: PureData Sources
        run: |
          sudo apt update
          sudo add-apt-repository ppa:pure-data/pure-data -y
          sudo apt install puredata -y
          sudo apt install libboost-all-dev
          sudo apt install libgtest-dev -y
          sudo apt install python3-pybind11 -y
          npm install -g tree-sitter-cli
      - name: Install compiler
        id: compiler
        run: |
          arch=""
          test "${{ matrix.arch }}" != "aarch64" || arch="aarch64-linux-gnu"
          test "${{ matrix.arch }}" != "arm" || arch="arm-linux-gnueabihf"
          if test -n "${arch}"; then
            sudo apt-get install -y g++-${arch}
            echo "arch=${arch}" >> $GITHUB_OUTPUT
          fi
      - name: Configure
        run: |
          arch="${{ steps.compiler.outputs.arch }}"
          cmake . -B build -DPD_FLOATSIZE=${{ matrix.precision }} -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.arch }} -DPD_LIB_DIR=./ -DCMAKE_BUILD_TYPE=Release ${arch:+-DCMAKE_C_COMPILER=${arch}-gcc -DCMAKE_CXX_COMPILER=${arch}-g++}
      - name: Build Object
        run: |
          cmake --build build -- -j$(nproc)
          sudo cmake --install build
      - name: Upload Object
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.LIBNAME}}-${{env.LIBVERSION}}-ubuntu-latest-${{matrix.arch}}-pd${{matrix.precision}}
          path: ${{env.LIBNAME}}
  windows-build:
    runs-on: windows-latest
    strategy:
      matrix:
        compiler: [clang]
        arch: [amd64]
        precision: [32] #, 64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install LLVM
        shell: pwsh
        run: |
          winget install -e --id LLVM.LLVM --accept-source-agreements --accept-package-agreements

      - name: Check if clang is in PATH
        shell: pwsh
        continue-on-error: true
        run: |
          clang --version

      - name: Install pybind11
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybind11

      - name: Install PureData Float 32
        run: |
          winget install -e --id MillerPuckette.PureData --accept-source-agreements
      - name: Configure and build Clang
        shell: pwsh
        run: |
          $pybind11Dir = python -m pybind11 --cmakedir
          $treeSitterBin = (Get-Command tree-sitter.cmd -ErrorAction SilentlyContinue).Source
          if (-not $treeSitterBin) {
            $treeSitterBin = (Get-Command tree-sitter -ErrorAction SilentlyContinue).Source
          }
          if (-not $treeSitterBin) {
            throw "tree-sitter CLI not found in PATH"
          }
    
          cmake . -B build -G Ninja -DPD_FLOATSIZE=${{ matrix.precision }} -DPD_LIB_DIR=./ -DCMAKE_BUILD_TYPE=Release -Dpybind11_DIR="$pybind11Dir" -DTREE_SITTER_EXECUTABLE="$treeSitterBin" -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DOSCOFO_BUILD_TESTS=OFF
          cmake --build build --parallel
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.LIBNAME}}-${{env.LIBVERSION}}-windows-latest-${{matrix.arch}}-pd${{matrix.precision}}
          path: ${{env.LIBNAME}}
