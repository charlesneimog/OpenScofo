---
name: Compile PureData Object
on:
  push:
    branches: [main]
#╭──────────────────────────────────────╮
#│  Uncomment if you want to trigger a  │
#│               release                │
#╰──────────────────────────────────────╯
  # workflow_dispatch:
  #   inputs:
  #     publish_release:
  #       description: Publish a GitHub Release using LIBVERSION after build
  #       required: false
  #       type: boolean
  #       default: false
env:
  LIBNAME: OpenScofo
  LIBVERSION: 0.1.4
permissions:
  contents: write
jobs:
  python:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: Mac Build
        if: runner.os == 'macOS'
        run: |
          pip install build scikit-build-core cibuildwheel twine
          CMAKE_BUILD_PARALLEL_LEVEL=8 cibuildwheel --output-dir dist
      - name: Linux Build
        if: runner.os == 'Linux'
        run: |
          pip install build scikit-build-core cibuildwheel twine
          CMAKE_BUILD_PARALLEL_LEVEL=8 cibuildwheel --output-dir dist
      - name: Windows Build
        if: runner.os == 'Windows'
        run: |
          python -m pip install build scikit-build-core cibuildwheel twine
          $env:CMAKE_BUILD_PARALLEL_LEVEL = "8"
          cibuildwheel --output-dir dist
      - name: Upload to PyPI
        run: |
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_API_TOKEN }}
  macos:
    runs-on: ${{ matrix.machines }}
    strategy:
      matrix:
        precision: [32] #, 64]
        machines: [macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install PureData and Deps
        run: |
          brew install pd
          brew install pybind11
          brew install googletest
          brew install tree-sitter
          brew install boost
          npm install -g tree-sitter-cli
      - name: Build
        run: |
          cmake . -B build -DPD_LIB_DIR=./ -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DPD_FLOATSIZE=${{ matrix.precision }}
          cmake --build build --parallel $(sysctl -n hw.physicalcpu)
          sudo cmake --install build
      - name: Upload Object
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.LIBNAME}}-${{env.LIBVERSION}}-${{matrix.machines}}-universal-pd${{matrix.precision}}
          path: ${{env.LIBNAME}}
  linux-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64] #, arm, aarch64]
        precision: [32] #, 64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - name: PureData Sources
        run: |
          sudo apt update
          sudo add-apt-repository ppa:pure-data/pure-data -y
          sudo apt install puredata -y
          sudo apt install libboost-all-dev
          sudo apt install libgtest-dev -y
          sudo apt install python3-pybind11 -y
          npm install -g tree-sitter-cli
      - name: Install compiler
        id: compiler
        run: |
          arch=""
          test "${{ matrix.arch }}" != "aarch64" || arch="aarch64-linux-gnu"
          test "${{ matrix.arch }}" != "arm" || arch="arm-linux-gnueabihf"
          if test -n "${arch}"; then
            sudo apt-get install -y g++-${arch}
            echo "arch=${arch}" >> $GITHUB_OUTPUT
          fi
      - name: Configure
        run: |
          arch="${{ steps.compiler.outputs.arch }}"
          cmake . -B build -DPD_FLOATSIZE=${{ matrix.precision }} -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.arch }} -DPD_LIB_DIR=./ -DCMAKE_BUILD_TYPE=Release ${arch:+-DCMAKE_C_COMPILER=${arch}-gcc -DCMAKE_CXX_COMPILER=${arch}-g++}
      - name: Build Object
        run: |
          cmake --build build -- -j$(nproc)
          sudo cmake --install build
      - name: Upload Object
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.LIBNAME}}-${{env.LIBVERSION}}-ubuntu-latest-${{matrix.arch}}-pd${{matrix.precision}}
          path: ${{env.LIBNAME}}
  windows-build:
    runs-on: windows-latest
    strategy:
      matrix:
        compiler: [mingw]
        arch: [amd64]
        precision: [32] #, 64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - if: matrix.compiler == 'mingw'
        name: Set up Msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          install: make mingw-w64-x86_64-gcc mingw64/mingw-w64-x86_64-cmake make mingw-w64-x86_64-gcc mingw64/mingw-w64-x86_64-cmake mingw-w64-x86_64-tree-sitter mingw-w64-x86_64-pybind11 mingw-w64-x86_64-gtest zip
          update: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install PureData Float 32
        if: matrix.precision == '32'
        run: |
          winget install -e --id MillerPuckette.PureData --accept-source-agreements
      - name: Install PureData Float 64
        if: matrix.precision == '64'
        run: |
          winget install -e --id MillerPuckette.Pd64 --accept-source-agreements
      - name: Configure and build Mingw
        shell: msys2 {0}
        if: matrix.compiler == 'mingw'
        run: |
          cmake . -B build -DPD_FLOATSIZE=${{ matrix.precision }} -DCMAKE_SYSTEM_NAME=Windows -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.arch }} -DPD_LIB_DIR=./ -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          cmake --install build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.LIBNAME}}-${{env.LIBVERSION}}-windows-latest-${{matrix.arch}}-pd${{matrix.precision}}
          path: ${{env.LIBNAME}}
